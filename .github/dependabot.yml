version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    groups:
      major:
        patterns: ["*"]
        update-types: [major]
      minor-and-patch:
        patterns: ["*"]
        update-types: [minor, patch]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      major:
        patterns: ["*"]
        update-types: [major]
      minor-and-patch:
        patterns: ["*"]
        update-types: [minor, patch]
